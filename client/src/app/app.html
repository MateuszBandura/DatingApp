<div class="card w-1/2 mx-auto p-10 mt-10 shadow-xl bg-gray-800">
    <h1 class="text-3xl text-red-500">{{title()}}</h1>

    <ul class="list">
        @for (member of members(); track member.id) {
            <li class="list-row items-center">
                <img src="/user.webp" alt="user avatar" class="size-12 rounded-box">
                {{member.id}} - {{member.displayName}}
            </li>
        }
    </ul>

</div>
